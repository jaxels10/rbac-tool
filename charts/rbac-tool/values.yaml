replicaCount: 1

image:
  repository: ghcr.io/jaxels10/rbac-tool
  pullPolicy: IfNotPresent
  # Overrides the image tag; defaults to the chart appVersion
  tag: "sha-6661015"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Creates a dedicated ServiceAccount for the pod
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65534
  fsGroup: 65534

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: rbac-tool.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: http

readinessProbe:
  httpGet:
    path: /
    port: http

nodeSelector: {}
tolerations: []
affinity: {}

# Optional: pre-seed the feedback model at deploy time.
# Export your trained model via the UI ("Download model"), then paste the
# contents here. Seed entries are only applied for findings that have no
# existing user decision — they never overwrite live feedback.
# Example:
#   feedbackSeed:
#     "a1b2c3d4e5f6a7b8": "dismissed"
#     "b2c3d4e5f6a7b8c9": "confirmed"
feedbackSeed: {}
